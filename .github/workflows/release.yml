name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go test
        run: go test ./...

      - name: Build static linux binaries
        env:
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#v}"
          ldflags="-s -w -X github.com/alyx/aloc/internal/cli.Version=${version}"
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$ldflags" -o "dist/aloc-${version}-linux-x86_64" ./cmd/aloc
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "$ldflags" -o "dist/aloc-${version}-linux-aarch64" ./cmd/aloc

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
